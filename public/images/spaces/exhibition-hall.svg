<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="600px" viewBox="0 0 800 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Exhibition Hall</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect fill="#F8F9FA" x="0" y="0" width="800" height="600"></rect>
        <!-- Hall Outline -->
        <rect stroke="#333333" stroke-width="4" x="100" y="100" width="600" height="400" rx="8"></rect>
        <!-- Exhibition Walls -->
        <rect fill="#FFFFFF" stroke="#333333" stroke-width="2" x="200" y="150" width="200" height="300"></rect>
        <rect fill="#FFFFFF" stroke="#333333" stroke-width="2" x="450" y="150" width="200" height="300"></rect>
        <!-- Artwork Frames -->
        <rect fill="#FFD700" stroke="#333333" stroke-width="2" x="250" y="180" width="100" height="80" rx="2"></rect>
        <rect fill="#FFD700" stroke="#333333" stroke-width="2" x="250" y="300" width="100" height="120" rx="2"></rect>
        <rect fill="#FFD700" stroke="#333333" stroke-width="2" x="500" y="180" width="100" height="120" rx="2"></rect>
        <rect fill="#FFD700" stroke="#333333" stroke-width="2" x="500" y="340" width="100" height="80" rx="2"></rect>
        <!-- Display Pedestals -->
        <rect fill="#E0E0E0" x="150" y="350" width="40" height="100"></rect>
        <rect fill="#E0E0E0" x="350" y="200" width="40" height="100"></rect>
        <rect fill="#E0E0E0" x="610" y="350" width="40" height="100"></rect>
        <!-- Display Objects -->
        <rect fill="#9C27B0" x="155" y="330" width="30" height="30" rx="15"></rect>
        <rect fill="#4CAF50" x="355" y="180" width="30" height="30" rx="4"></rect>
        <rect fill="#FF5722" x="615" y="330" width="30" height="30" rx="2"></rect>
        <!-- Ceiling Spotlights -->
        <line stroke="#333333" stroke-width="2" x1="300" y1="100" x2="300" y2="140"></line>
        <circle fill="#FFEB3B" cx="300" cy="140" r="10"></circle>
        <line stroke="#333333" stroke-width="2" x1="550" y1="100" x2="550" y2="140"></line>
        <circle fill="#FFEB3B" cx="550" cy="140" r="10"></circle>
        <line stroke="#333333" stroke-width="2" x1="170" y1="100" x2="170" y2="140"></line>
        <circle fill="#FFEB3B" cx="170" cy="140" r="10"></circle>
        <line stroke="#333333" stroke-width="2" x1="630" y1="100" x2="630" y2="140"></line>
        <circle fill="#FFEB3B" cx="630" cy="140" r="10"></circle>
    </g>
</svg>
