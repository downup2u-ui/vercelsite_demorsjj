<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="600px" viewBox="0 0 800 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Creative Studio</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect fill="#F8F9FA" x="0" y="0" width="800" height="600"></rect>
        <!-- Studio Outline -->
        <rect stroke="#333333" stroke-width="4" x="100" y="100" width="600" height="400" rx="8"></rect>
        <!-- Design Workstations -->
        <rect fill="#E0E0E0" stroke="#333333" stroke-width="2" x="150" y="150" width="200" height="120" rx="4"></rect>
        <rect fill="#E0E0E0" stroke="#333333" stroke-width="2" x="150" y="330" width="200" height="120" rx="4"></rect>
        <rect fill="#E0E0E0" stroke="#333333" stroke-width="2" x="450" y="150" width="200" height="120" rx="4"></rect>
        <rect fill="#E0E0E0" stroke="#333333" stroke-width="2" x="450" y="330" width="200" height="120" rx="4"></rect>
        <!-- Computers -->
        <rect fill="#333333" x="200" y="180" width="100" height="60" rx="2"></rect>
        <rect fill="#333333" x="200" y="360" width="100" height="60" rx="2"></rect>
        <rect fill="#333333" x="500" y="180" width="100" height="60" rx="2"></rect>
        <rect fill="#333333" x="500" y="360" width="100" height="60" rx="2"></rect>
        <!-- 3D Printer -->
        <rect fill="#9E9E9E" stroke="#333333" stroke-width="2" x="350" y="220" width="100" height="160" rx="4"></rect>
        <rect fill="#333333" x="370" y="240" width="60" height="40"></rect>
        <rect fill="#E0E0E0" x="370" y="300" width="60" height="60"></rect>
        <!-- Windows -->
        <rect fill="#B3E5FC" stroke="#333333" stroke-width="2" x="120" y="120" width="560" height="30"></rect>
        <line stroke="#333333" stroke-width="2" x1="260" y1="120" x2="260" y2="150"></line>
        <line stroke="#333333" stroke-width="2" x1="400" y1="120" x2="400" y2="150"></line>
        <line stroke="#333333" stroke-width="2" x1="540" y1="120" x2="540" y2="150"></line>
    </g>
</svg>
