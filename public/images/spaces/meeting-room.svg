<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="600px" viewBox="0 0 800 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>Meeting Room</title>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect fill="#F8F9FA" x="0" y="0" width="800" height="600"></rect>
        <!-- Room Outline -->
        <rect stroke="#333333" stroke-width="4" x="100" y="100" width="600" height="400" rx="8"></rect>
        <!-- Conference Table -->
        <rect fill="#8B4513" x="200" y="200" width="400" height="200" rx="20"></rect>
        <!-- Chairs -->
        <circle fill="#4A4A4A" cx="200" cy="300" r="20"></circle>
        <circle fill="#4A4A4A" cx="600" cy="300" r="20"></circle>
        <circle fill="#4A4A4A" cx="400" cy="200" r="20"></circle>
        <circle fill="#4A4A4A" cx="400" cy="400" r="20"></circle>
        <circle fill="#4A4A4A" cx="300" cy="200" r="20"></circle>
        <circle fill="#4A4A4A" cx="500" cy="200" r="20"></circle>
        <circle fill="#4A4A4A" cx="300" cy="400" r="20"></circle>
        <circle fill="#4A4A4A" cx="500" cy="400" r="20"></circle>
        <!-- Projector Screen -->
        <rect fill="#FFFFFF" stroke="#333333" stroke-width="2" x="300" y="120" width="200" height="40"></rect>
        <!-- Window -->
        <rect fill="#B3E5FC" stroke="#333333" stroke-width="2" x="120" y="150" width="60" height="300"></rect>
        <line stroke="#333333" stroke-width="2" x1="120" y1="300" x2="180" y2="300"></line>
    </g>
</svg>
