<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#f8f9fa"/>
  
  <!-- 拍卖台 -->
  <rect x="350" y="350" width="500" height="20" rx="4" ry="4" fill="#1a202c"/>
  <rect x="550" y="250" width="100" height="100" rx="8" ry="8" fill="#ffffff" stroke="#1a202c" stroke-width="2"/>
  
  <!-- 拍卖品 - 艺术品 -->
  <rect x="565" y="265" width="70" height="70" rx="4" ry="4" fill="#f8f9fa" stroke="#2d3748" stroke-width="1"/>
  <path d="M580 285 L590 275 L610 295 L620 285" stroke="#1a202c" stroke-width="2" fill="none"/>
  <circle cx="600" cy="290" r="15" fill="#4a5568" opacity="0.5"/>
  
  <!-- 拍卖锤 -->
  <rect x="680" y="280" width="60" height="10" rx="2" ry="2" fill="#1a202c"/>
  <rect x="730" y="270" width="20" height="30" rx="4" ry="4" fill="#1a202c"/>
  
  <!-- 竞拍者 -->
  <circle cx="400" cy="300" r="20" fill="#1a202c"/>
  <rect x="395" y="320" width="10" height="30" fill="#1a202c"/>
  <rect x="380" y="330" width="40" height="10" fill="#1a202c"/>
  <rect x="390" y="270" width="20" height="10" rx="5" ry="5" fill="#ffffff"/>
  <text x="400" y="260" font-family="Arial" font-size="14" text-anchor="middle" fill="#1a202c">¥5000</text>
  
  <circle cx="800" cy="300" r="20" fill="#1a202c"/>
  <rect x="795" y="320" width="10" height="30" fill="#1a202c"/>
  <rect x="780" y="330" width="40" height="10" fill="#1a202c"/>
  <rect x="790" y="270" width="20" height="10" rx="5" ry="5" fill="#ffffff"/>
  <text x="800" y="260" font-family="Arial" font-size="14" text-anchor="middle" fill="#1a202c">¥5500</text>
  
  <!-- 价格显示板 -->
  <rect x="450" y="150" width="300" height="60" rx="8" ry="8" fill="#ffffff" stroke="#1a202c" stroke-width="2"/>
  <text x="600" y="175" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">当前价格</text>
  <text x="600" y="205" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a202c">¥6000</text>
  
  <!-- 计时器 -->
  <rect x="500" y="400" width="200" height="40" rx="8" ry="8" fill="#ffffff" stroke="#1a202c" stroke-width="2"/>
  <text x="600" y="425" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a202c">剩余时间: 02:45</text>
  
  <!-- 装饰元素 - 左侧拍品 -->
  <rect x="250" y="180" width="120" height="100" rx="4" ry="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="260" y="190" width="100" height="70" rx="2" ry="2" fill="#f8f9fa" stroke="#2d3748" stroke-width="1"/>
  <text x="310" y="300" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">起拍价: ¥3000</text>
  
  <!-- 装饰元素 - 右侧拍品 -->
  <rect x="830" y="180" width="120" height="100" rx="4" ry="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="840" y="190" width="100" height="70" rx="2" ry="2" fill="#f8f9fa" stroke="#2d3748" stroke-width="1"/>
  <text x="890" y="300" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">起拍价: ¥4500</text>
  
  <!-- 标题 -->
  <text x="600" y="80" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a202c">艺术品拍卖</text>
  <text x="600" y="110" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">发现独特艺术作品，参与线上拍卖，收藏珍贵创意</text>
  
  <!-- 底部装饰 -->
  <rect x="300" y="480" width="600" height="2" fill="#e2e8f0"/>
  <text x="600" y="510" font-family="Arial" font-size="14" text-anchor="middle" fill="#718096">每件拍品均经过专业鉴定，确保真实性和价值</text>
  <text x="600" y="530" font-family="Arial" font-size="14" text-anchor="middle" fill="#718096">拍卖结束后，我们将协助买卖双方完成交易和物流</text>
</svg>
