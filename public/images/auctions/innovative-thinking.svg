<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- 创新思维艺术画布 -->
  <rect x="150" y="100" width="500" height="400" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  
  <!-- 头脑/大脑轮廓 -->
  <path d="M350 150 Q400 120 450 150 Q500 200 480 250 Q500 300 450 350 Q400 380 350 350 Q300 300 320 250 Q300 200 350 150 Z" fill="none" stroke="#1a202c" stroke-width="3"/>
  
  <!-- 思维连接线 -->
  <line x1="350" y1="200" x2="250" y2="180" stroke="#4a5568" stroke-width="2"/>
  <line x1="320" y1="250" x2="220" y2="250" stroke="#4a5568" stroke-width="2"/>
  <line x1="350" y1="300" x2="250" y2="320" stroke="#4a5568" stroke-width="2"/>
  
  <line x1="450" y1="200" x2="550" y2="180" stroke="#4a5568" stroke-width="2"/>
  <line x1="480" y1="250" x2="580" y2="250" stroke="#4a5568" stroke-width="2"/>
  <line x1="450" y1="300" x2="550" y2="320" stroke="#4a5568" stroke-width="2"/>
  
  <!-- 思维节点 -->
  <circle cx="250" cy="180" r="15" fill="#a0aec0"/>
  <circle cx="220" cy="250" r="15" fill="#a0aec0"/>
  <circle cx="250" cy="320" r="15" fill="#a0aec0"/>
  
  <circle cx="550" cy="180" r="15" fill="#a0aec0"/>
  <circle cx="580" cy="250" r="15" fill="#a0aec0"/>
  <circle cx="550" cy="320" r="15" fill="#a0aec0"/>
  
  <!-- 创新符号 -->
  <circle cx="400" cy="250" r="30" fill="none" stroke="#2d3748" stroke-width="2"/>
  <line x1="400" y1="220" x2="400" y2="280" stroke="#2d3748" stroke-width="2"/>
  <line x1="370" y1="250" x2="430" y2="250" stroke="#2d3748" stroke-width="2"/>
  
  <!-- 灯泡图标 -->
  <circle cx="400" cy="180" r="20" fill="#cbd5e0"/>
  <path d="M390 200 L390 220" stroke="#4a5568" stroke-width="2"/>
  <path d="M410 200 L410 220" stroke="#4a5568" stroke-width="2"/>
  <path d="M390 220 L410 220" stroke="#4a5568" stroke-width="2"/>
  
  <!-- 齿轮图标 -->
  <circle cx="350" cy="250" r="15" fill="none" stroke="#4a5568" stroke-width="2"/>
  <path d="M350 235 L350 230" stroke="#4a5568" stroke-width="2"/>
  <path d="M335 250 L330 250" stroke="#4a5568" stroke-width="2"/>
  <path d="M350 265 L350 270" stroke="#4a5568" stroke-width="2"/>
  <path d="M365 250 L370 250" stroke="#4a5568" stroke-width="2"/>
  <path d="M340 240 L335 235" stroke="#4a5568" stroke-width="2"/>
  <path d="M360 240 L365 235" stroke="#4a5568" stroke-width="2"/>
  <path d="M340 260 L335 265" stroke="#4a5568" stroke-width="2"/>
  <path d="M360 260 L365 265" stroke="#4a5568" stroke-width="2"/>
  
  <!-- 火箭图标 -->
  <path d="M450 250 L470 230 L470 270 Z" fill="#4a5568"/>
  <rect x="450" y="245" width="10" height="10" fill="#a0aec0"/>
  
  <!-- 连接线 -->
  <path d="M250 380 Q400 450 550 380" stroke="#718096" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
  
  <!-- 底部文字标签 -->
  <text x="250" cy="400" font-family="Arial" font-size="14" text-anchor="middle" fill="#4a5568">思考</text>
  <text x="400" cy="420" font-family="Arial" font-size="14" text-anchor="middle" fill="#4a5568">创新</text>
  <text x="550" cy="400" font-family="Arial" font-size="14" text-anchor="middle" fill="#4a5568">实现</text>
  
  <!-- 艺术家签名 -->
  <text x="500" y="480" font-family="Arial" font-style="italic" font-size="16" fill="#4a5568">Innovative Mind by T. Li</text>
  
  <!-- 标题 -->
  <text x="400" y="530" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">创新思维</text>
</svg>
