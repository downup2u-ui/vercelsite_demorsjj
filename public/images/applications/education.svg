<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 教育模型 -->
  <g transform="translate(250, 100)">
    <!-- 分子模型 -->
    <circle cx="150" cy="100" r="30" fill="#3182ce"/>
    <circle cx="200" cy="150" r="30" fill="#3182ce"/>
    <circle cx="100" cy="150" r="30" fill="#3182ce"/>
    <circle cx="150" cy="200" r="30" fill="#3182ce"/>
    
    <!-- 连接线 -->
    <line x1="150" y1="100" x2="200" y2="150" stroke="#4a5568" stroke-width="5"/>
    <line x1="150" y1="100" x2="100" y2="150" stroke="#4a5568" stroke-width="5"/>
    <line x1="150" y1="200" x2="200" y2="150" stroke="#4a5568" stroke-width="5"/>
    <line x1="150" y1="200" x2="100" y2="150" stroke="#4a5568" stroke-width="5"/>
    
    <!-- 书本 -->
    <rect x="50" y="50" width="60" height="10" rx="2" fill="#4a5568"/>
    <path d="M50 50 Q50 20 80 20 Q110 20 110 50" stroke="#4a5568" stroke-width="10" fill="none"/>
    <path d="M50 60 Q50 90 80 90 Q110 90 110 60" stroke="#4a5568" stroke-width="10" fill="none"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">教育与研究</text>
  <text x="400" y="380" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">教学模型、科学演示工具、研究原型</text>
</svg>
