<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 医疗模型 -->
  <g transform="translate(300, 100)">
    <!-- 头骨模型 -->
    <ellipse cx="100" cy="150" rx="80" ry="100" fill="#e2e8f0"/>
    <ellipse cx="100" cy="150" rx="70" ry="90" fill="#f8f9fa"/>
    
    <!-- 下颌骨 -->
    <path d="M50 200 Q100 230 150 200" stroke="#e2e8f0" stroke-width="10" fill="none"/>
    
    <!-- 眼窝 -->
    <ellipse cx="70" cy="130" rx="15" ry="20" fill="#e2e8f0"/>
    <ellipse cx="130" cy="130" rx="15" ry="20" fill="#e2e8f0"/>
    
    <!-- 鼻腔 -->
    <path d="M90 150 Q100 170 110 150" stroke="#e2e8f0" stroke-width="5" fill="none"/>
    
    <!-- 牙齿 -->
    <rect x="80" y="180" width="40" height="5" fill="#e2e8f0"/>
    
    <!-- 医疗十字标志 -->
    <rect x="180" y="50" width="60" height="60" rx="5" fill="#3182ce"/>
    <rect x="195" y="65" width="30" height="30" fill="white"/>
    <rect x="205" y="55" width="10" height="50" fill="white"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">医疗与生物工程</text>
  <text x="400" y="380" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">定制化医疗器械、解剖模型、假肢组件</text>
</svg>
