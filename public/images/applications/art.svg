<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 艺术模型 -->
  <g transform="translate(250, 100)">
    <!-- 雕塑 -->
    <path d="M150 50 C100 100 200 100 150 150 C100 200 200 200 150 250" stroke="#4a5568" stroke-width="8" fill="none"/>
    
    <!-- 装饰品 -->
    <circle cx="250" cy="100" r="30" fill="#3182ce" opacity="0.7"/>
    <circle cx="250" cy="100" r="20" fill="#f8f9fa"/>
    <circle cx="250" cy="100" r="10" fill="#3182ce" opacity="0.7"/>
    
    <!-- 艺术装置 -->
    <rect x="220" y="150" width="60" height="60" fill="#3182ce" opacity="0.5"/>
    <rect x="230" y="160" width="40" height="40" fill="#f8f9fa"/>
    <rect x="240" y="170" width="20" height="20" fill="#3182ce" opacity="0.5"/>
    
    <!-- 珠宝设计 -->
    <circle cx="80" cy="100" r="25" fill="none" stroke="#4a5568" stroke-width="2"/>
    <circle cx="80" cy="100" r="20" fill="none" stroke="#4a5568" stroke-width="2"/>
    <circle cx="80" cy="100" r="15" fill="none" stroke="#4a5568" stroke-width="2"/>
    <circle cx="80" cy="100" r="10" fill="none" stroke="#4a5568" stroke-width="2"/>
    <circle cx="80" cy="100" r="5" fill="#3182ce"/>
    
    <!-- 调色板 -->
    <circle cx="80" cy="200" r="30" fill="#4a5568"/>
    <circle cx="65" cy="185" r="8" fill="#3182ce"/>
    <circle cx="95" cy="185" r="8" fill="#48bb78"/>
    <circle cx="65" cy="215" r="8" fill="#ed8936"/>
    <circle cx="95" cy="215" r="8" fill="#9f7aea"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">艺术与创意</text>
  <text x="400" y="380" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">雕塑、装饰品、艺术装置、珠宝设计</text>
</svg>
