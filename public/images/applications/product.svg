<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 产品设计模型 -->
  <g transform="translate(250, 100)">
    <!-- 产品原型 -->
    <rect x="100" y="100" width="200" height="100" rx="20" fill="#e2e8f0"/>
    <rect x="120" y="120" width="160" height="60" rx="10" fill="#f8f9fa"/>
    
    <!-- 按钮 -->
    <circle cx="150" cy="150" r="10" fill="#3182ce"/>
    <circle cx="180" cy="150" r="10" fill="#3182ce"/>
    <circle cx="210" cy="150" r="10" fill="#3182ce"/>
    <circle cx="240" cy="150" r="10" fill="#3182ce"/>
    
    <!-- 设计图纸 -->
    <rect x="50" y="50" width="100" height="150" fill="white" stroke="#4a5568" stroke-width="2"/>
    <line x1="70" y1="70" x2="130" y2="70" stroke="#4a5568" stroke-width="1"/>
    <line x1="70" y1="90" x2="130" y2="90" stroke="#4a5568" stroke-width="1"/>
    <line x1="70" y1="110" x2="130" y2="110" stroke="#4a5568" stroke-width="1"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="#4a5568" stroke-width="1"/>
    <line x1="70" y1="150" x2="130" y2="150" stroke="#4a5568" stroke-width="1"/>
    <line x1="70" y1="170" x2="130" y2="170" stroke="#4a5568" stroke-width="1"/>
    
    <!-- 尺寸标注 -->
    <line x1="100" y1="220" x2="300" y2="220" stroke="#4a5568" stroke-width="1"/>
    <line x1="100" y1="215" x2="100" y2="225" stroke="#4a5568" stroke-width="1"/>
    <line x1="300" y1="215" x2="300" y2="225" stroke="#4a5568" stroke-width="1"/>
    <text x="200" y="235" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">200mm</text>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="350" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">产品设计</text>
  <text x="400" y="380" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">功能性原型、概念验证模型、产品外观设计</text>
</svg>
