<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#f8f9fa"/>
  
  <!-- CRM主视觉 -->
  <rect x="250" y="100" width="700" height="400" rx="8" ry="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- 客户关系图 -->
  <circle cx="600" cy="250" r="80" fill="#f8f9fa" stroke="#1a202c" stroke-width="2"/>
  <text x="600" y="255" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">您的业务</text>
  
  <!-- 客户连接线 -->
  <line x1="600" y1="170" x2="600" y2="130" stroke="#2d3748" stroke-width="2"/>
  <line x1="670" y1="220" x2="720" y2="180" stroke="#2d3748" stroke-width="2"/>
  <line x1="670" y1="280" x2="720" y2="320" stroke="#2d3748" stroke-width="2"/>
  <line x1="600" y1="330" x2="600" y2="370" stroke="#2d3748" stroke-width="2"/>
  <line x1="530" y1="280" x2="480" y2="320" stroke="#2d3748" stroke-width="2"/>
  <line x1="530" y1="220" x2="480" y2="180" stroke="#2d3748" stroke-width="2"/>
  
  <!-- 客户节点 -->
  <circle cx="600" cy="100" r="30" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="600" y="105" font-family="Arial" font-size="12" text-anchor="middle" fill="#1890ff">新客户</text>
  
  <circle cx="750" cy="150" r="30" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="750" y="155" font-family="Arial" font-size="12" text-anchor="middle" fill="#52c41a">长期客户</text>
  
  <circle cx="750" cy="350" r="30" fill="#fff2e8" stroke="#fa541c" stroke-width="2"/>
  <text x="750" y="355" font-family="Arial" font-size="12" text-anchor="middle" fill="#fa541c">潜在客户</text>
  
  <circle cx="600" cy="400" r="30" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="600" y="405" font-family="Arial" font-size="12" text-anchor="middle" fill="#722ed1">合作伙伴</text>
  
  <circle cx="450" cy="350" r="30" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="450" y="355" font-family="Arial" font-size="12" text-anchor="middle" fill="#fa8c16">供应商</text>
  
  <circle cx="450" cy="150" r="30" fill="#f0f5ff" stroke="#2f54eb" stroke-width="2"/>
  <text x="450" y="155" font-family="Arial" font-size="12" text-anchor="middle" fill="#2f54eb">代理商</text>
  
  <!-- 数据统计 -->
  <rect x="300" y="150" width="100" height="80" rx="4" ry="4" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="180" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">128</text>
  <text x="350" y="200" font-family="Arial" font-size="12" text-anchor="middle" fill="#718096">活跃客户</text>
  
  <rect x="300" y="250" width="100" height="80" rx="4" ry="4" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="280" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">45</text>
  <text x="350" y="300" font-family="Arial" font-size="12" text-anchor="middle" fill="#718096">销售机会</text>
  
  <rect x="300" y="350" width="100" height="80" rx="4" ry="4" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="380" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">92%</text>
  <text x="350" y="400" font-family="Arial" font-size="12" text-anchor="middle" fill="#718096">客户满意度</text>
  
  <!-- 销售漏斗 -->
  <path d="M800 150 L900 150 L875 200 L825 200 Z" fill="#e6f7ff" stroke="#1890ff" stroke-width="1"/>
  <text x="850" y="180" font-family="Arial" font-size="12" text-anchor="middle" fill="#1890ff">线索 (64)</text>
  
  <path d="M825 210 L875 210 L860 260 L840 260 Z" fill="#f6ffed" stroke="#52c41a" stroke-width="1"/>
  <text x="850" y="240" font-family="Arial" font-size="12" text-anchor="middle" fill="#52c41a">商机 (45)</text>
  
  <path d="M840 270 L860 270 L855 320 L845 320 Z" fill="#fff2e8" stroke="#fa541c" stroke-width="1"/>
  <text x="850" y="300" font-family="Arial" font-size="12" text-anchor="middle" fill="#fa541c">报价 (28)</text>
  
  <path d="M845 330 L855 330 L852 380 L848 380 Z" fill="#f9f0ff" stroke="#722ed1" stroke-width="1"/>
  <text x="850" y="360" font-family="Arial" font-size="12" text-anchor="middle" fill="#722ed1">成交 (16)</text>
  
  <!-- 标题 -->
  <text x="600" y="530" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">客户关系管理系统</text>
</svg>
