<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="600" fill="#f8f9fa"/>
  
  <!-- 3D打印机 -->
  <g transform="translate(400, 100) scale(1.2)">
    <!-- 打印机框架 -->
    <rect x="100" y="100" width="200" height="300" rx="10" fill="#2d3748" stroke="#1a202c" stroke-width="4"/>
    
    <!-- 打印平台 -->
    <rect x="120" y="350" width="160" height="10" fill="#4a5568"/>
    
    <!-- 打印头 -->
    <rect x="150" y="150" width="100" height="40" rx="5" fill="#4a5568"/>
    <rect x="190" y="190" width="20" height="30" fill="#4a5568"/>
    
    <!-- 打印中的模型 -->
    <path d="M190 220 L170 270 L210 270 Z" fill="#3182ce" opacity="0.8"/>
    
    <!-- 控制面板 -->
    <rect x="130" y="120" width="60" height="20" rx="3" fill="#2c5282"/>
    <circle cx="150" cy="130" r="5" fill="#63b3ed"/>
    <circle cx="170" cy="130" r="5" fill="#63b3ed"/>
    
    <!-- 支撑结构 -->
    <rect x="100" y="400" width="200" height="20" fill="#2d3748"/>
    <rect x="120" y="420" width="160" height="10" fill="#4a5568"/>
  </g>
  
  <!-- 3D模型 -->
  <g transform="translate(700, 200)">
    <!-- 立方体 -->
    <path d="M50 100 L150 50 L250 100 L150 150 Z" fill="#3182ce" opacity="0.7"/>
    <path d="M50 100 L50 200 L150 250 L150 150 Z" fill="#2b6cb0" opacity="0.8"/>
    <path d="M150 150 L150 250 L250 200 L250 100 Z" fill="#2c5282" opacity="0.9"/>
    
    <!-- 球体 -->
    <circle cx="350" cy="150" r="70" fill="#4299e1" opacity="0.7"/>
    <ellipse cx="350" cy="150" rx="70" ry="30" fill="#3182ce" opacity="0.5"/>
  </g>
  
  <!-- 文字 -->
  <text x="600" y="500" font-family="Arial" font-size="48" font-weight="bold" text-anchor="middle" fill="#1a202c">3D打印服务</text>
  <text x="600" y="550" font-family="Arial" font-size="24" text-anchor="middle" fill="#4a5568">高精度 · 多材料 · 快速交付</text>
</svg>
