<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 模型网格 -->
  <g transform="translate(100, 100)">
    <!-- 模型卡片1 -->
    <rect x="0" y="0" width="150" height="200" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- 模型预览 -->
    <rect x="10" y="10" width="130" height="130" rx="5" fill="#e2e8f0"/>
    <path d="M75 40 L50 90 L100 90 Z" fill="#3182ce" opacity="0.8"/>
    <!-- 模型信息 -->
    <rect x="20" y="150" width="110" height="10" rx="2" fill="#4a5568"/>
    <rect x="20" y="170" width="80" height="10" rx="2" fill="#a0aec0"/>
    
    <!-- 模型卡片2 -->
    <rect x="170" y="0" width="150" height="200" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- 模型预览 -->
    <rect x="180" y="10" width="130" height="130" rx="5" fill="#e2e8f0"/>
    <circle cx="245" cy="75" r="40" fill="#3182ce" opacity="0.8"/>
    <!-- 模型信息 -->
    <rect x="190" y="150" width="110" height="10" rx="2" fill="#4a5568"/>
    <rect x="190" y="170" width="80" height="10" rx="2" fill="#a0aec0"/>
    
    <!-- 模型卡片3 -->
    <rect x="340" y="0" width="150" height="200" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- 模型预览 -->
    <rect x="350" y="10" width="130" height="130" rx="5" fill="#e2e8f0"/>
    <rect x="380" y="45" width="70" height="70" fill="#3182ce" opacity="0.8"/>
    <!-- 模型信息 -->
    <rect x="360" y="150" width="110" height="10" rx="2" fill="#4a5568"/>
    <rect x="360" y="170" width="80" height="10" rx="2" fill="#a0aec0"/>
    
    <!-- 添加新模型卡片 -->
    <rect x="510" y="0" width="150" height="200" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M585 80 L585 120 M565 100 L605 100" stroke="#a0aec0" stroke-width="3" stroke-linecap="round"/>
    <text x="585" y="150" font-family="Arial" font-size="14" text-anchor="middle" fill="#a0aec0">添加新模型</text>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">我的模型</text>
</svg>
