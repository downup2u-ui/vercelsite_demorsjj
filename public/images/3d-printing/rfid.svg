<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- RFID标签 -->
  <g transform="translate(200, 100)">
    <!-- 标签外框 -->
    <rect x="0" y="0" width="150" height="200" rx="10" fill="white" stroke="#4a5568" stroke-width="2"/>
    
    <!-- RFID芯片 -->
    <rect x="50" y="50" width="50" height="50" rx="5" fill="#3182ce"/>
    
    <!-- 天线线圈 -->
    <rect x="20" y="20" width="110" height="160" rx="5" stroke="#4a5568" stroke-width="1" fill="none"/>
    <rect x="30" y="30" width="90" height="140" rx="5" stroke="#4a5568" stroke-width="1" fill="none"/>
    <rect x="40" y="40" width="70" height="120" rx="5" stroke="#4a5568" stroke-width="1" fill="none"/>
    
    <!-- 标签编号 -->
    <text x="75" y="180" font-family="Arial" font-size="12" text-anchor="middle" fill="#1a202c">ID: 12345678</text>
  </g>
  
  <!-- 手机扫描 -->
  <g transform="translate(450, 100)">
    <!-- 手机外框 -->
    <rect x="0" y="0" width="100" height="200" rx="10" fill="#2d3748"/>
    <rect x="10" y="20" width="80" height="140" rx="5" fill="#e2e8f0"/>
    
    <!-- 扫描界面 -->
    <rect x="20" y="40" width="60" height="60" rx="5" fill="#3182ce" opacity="0.3"/>
    <path d="M30 70 L70 70 M50 50 L50 90" stroke="#3182ce" stroke-width="2" stroke-dasharray="5 5"/>
    
    <!-- 认证成功 -->
    <circle cx="50" cy="130" r="15" fill="#48bb78"/>
    <path d="M40 130 L45 135 L60 120" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 手机按钮 -->
    <circle cx="50" cy="180" r="10" stroke="#a0aec0" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 连接线 -->
  <line x1="350" y1="150" x2="450" y2="150" stroke="#4a5568" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="440,145 450,150 440,155" fill="#4a5568"/>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">RFID防伪标签系统</text>
  <text x="400" y="350" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">扫描验证产品真伪</text>
</svg>
