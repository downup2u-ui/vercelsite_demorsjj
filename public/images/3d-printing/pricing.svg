<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 计算器图标 -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="150" height="200" rx="10" fill="#2d3748"/>
    <rect x="20" y="20" width="110" height="40" rx="5" fill="#e2e8f0"/>
    <rect x="20" y="80" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="60" y="80" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="100" y="80" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="20" y="120" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="60" y="120" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="100" y="120" width="30" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="20" y="160" width="70" height="30" rx="5" fill="#e2e8f0"/>
    <rect x="100" y="160" width="30" height="30" rx="5" fill="#3182ce"/>
  </g>
  
  <!-- 价格图表 -->
  <g transform="translate(400, 100)">
    <!-- 坐标轴 -->
    <line x1="0" y1="200" x2="250" y2="200" stroke="#4a5568" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#4a5568" stroke-width="2"/>
    
    <!-- 柱状图 -->
    <rect x="30" y="50" width="40" height="150" fill="#3182ce" opacity="0.7"/>
    <rect x="100" y="100" width="40" height="100" fill="#3182ce" opacity="0.7"/>
    <rect x="170" y="20" width="40" height="180" fill="#3182ce" opacity="0.7"/>
    
    <!-- 标签 -->
    <text x="50" y="220" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">PLA</text>
    <text x="120" y="220" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">ABS</text>
    <text x="190" y="220" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">树脂</text>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">价格计算器</text>
  <text x="400" y="350" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">根据模型尺寸和材料计算价格</text>
</svg>
