<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- PLA材料 -->
  <g transform="translate(100, 100)">
    <circle cx="50" cy="50" r="40" fill="#4ade80" opacity="0.8"/>
    <text x="50" y="120" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">PLA</text>
    <text x="50" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">生物可降解</text>
  </g>
  
  <!-- ABS材料 -->
  <g transform="translate(250, 100)">
    <circle cx="50" cy="50" r="40" fill="#f97316" opacity="0.8"/>
    <text x="50" y="120" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">ABS</text>
    <text x="50" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">高强度耐热</text>
  </g>
  
  <!-- 树脂材料 -->
  <g transform="translate(400, 100)">
    <circle cx="50" cy="50" r="40" fill="#60a5fa" opacity="0.8"/>
    <text x="50" y="120" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">树脂</text>
    <text x="50" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">高精度细节</text>
  </g>
  
  <!-- 金属材料 -->
  <g transform="translate(550, 100)">
    <circle cx="50" cy="50" r="40" fill="#94a3b8" opacity="0.8"/>
    <text x="50" y="120" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a202c">金属</text>
    <text x="50" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#4a5568">工业级强度</text>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">打印材料</text>
  <text x="400" y="300" font-family="Arial" font-size="18" text-anchor="middle" fill="#4a5568">多种材料满足不同需求</text>
</svg>
