<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 上传区域 -->
  <rect x="200" y="100" width="400" height="200" rx="10" stroke="#4a5568" stroke-width="2" stroke-dasharray="5 5" fill="white"/>
  
  <!-- 上传图标 -->
  <g transform="translate(350, 150)">
    <circle cx="50" cy="50" r="40" fill="#e2e8f0"/>
    <path d="M50 30 L50 70 M30 50 L70 50 M50 30 L35 45 M50 30 L65 45" stroke="#4a5568" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 文字 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">上传您的3D模型</text>
  <text x="400" y="330" font-family="Arial" font-size="16" text-anchor="middle" fill="#4a5568">支持STL、OBJ、3MF等格式</text>
  <text x="400" y="350" font-family="Arial" font-size="14" text-anchor="middle" fill="#718096">拖放文件或点击选择</text>
</svg>
