<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 订单列表 -->
  <g transform="translate(150, 100)">
    <!-- 订单卡片1 -->
    <rect x="0" y="0" width="500" height="80" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#3182ce" opacity="0.7"/>
    <rect x="80" y="20" width="150" height="10" rx="2" fill="#4a5568"/>
    <rect x="80" y="40" width="100" height="10" rx="2" fill="#a0aec0"/>
    <rect x="350" y="25" width="120" height="30" rx="15" fill="#c6f6d5"/>
    <text x="410" y="45" font-family="Arial" font-size="14" text-anchor="middle" fill="#2f855a">已完成</text>
    
    <!-- 订单卡片2 -->
    <rect x="0" y="100" width="500" height="80" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="40" cy="140" r="20" fill="#3182ce" opacity="0.7"/>
    <rect x="80" y="120" width="150" height="10" rx="2" fill="#4a5568"/>
    <rect x="80" y="140" width="100" height="10" rx="2" fill="#a0aec0"/>
    <rect x="350" y="125" width="120" height="30" rx="15" fill="#feebc8"/>
    <text x="410" y="145" font-family="Arial" font-size="14" text-anchor="middle" fill="#c05621">进行中</text>
    
    <!-- 订单卡片3 -->
    <rect x="0" y="200" width="500" height="80" rx="5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="40" cy="240" r="20" fill="#3182ce" opacity="0.7"/>
    <rect x="80" y="220" width="150" height="10" rx="2" fill="#4a5568"/>
    <rect x="80" y="240" width="100" height="10" rx="2" fill="#a0aec0"/>
    <rect x="350" y="225" width="120" height="30" rx="15" fill="#bee3f8"/>
    <text x="410" y="245" font-family="Arial" font-size="14" text-anchor="middle" fill="#2b6cb0">待处理</text>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a202c">订单管理</text>
</svg>
