<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#777" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#555" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="800" height="800" fill="#f8f8f8"/>
  <rect width="800" height="800" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Digital art elements -->
  <circle cx="400" cy="400" r="200" fill="none" stroke="url(#gradient1)" stroke-width="4"/>
  <circle cx="400" cy="400" r="150" fill="none" stroke="url(#gradient1)" stroke-width="3"/>
  <circle cx="400" cy="400" r="100" fill="none" stroke="url(#gradient1)" stroke-width="2"/>
  
  <!-- Connected nodes -->
  <circle cx="300" cy="300" r="20" fill="#333"/>
  <circle cx="500" cy="300" r="20" fill="#555"/>
  <circle cx="300" cy="500" r="20" fill="#777"/>
  <circle cx="500" cy="500" r="20" fill="#333"/>
  <circle cx="400" cy="250" r="15" fill="#555"/>
  <circle cx="400" cy="550" r="15" fill="#777"/>
  <circle cx="250" cy="400" r="15" fill="#333"/>
  <circle cx="550" cy="400" r="15" fill="#555"/>
  
  <!-- Connection lines -->
  <line x1="300" y1="300" x2="500" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="300" x2="300" y2="500" stroke="#555" stroke-width="2"/>
  <line x1="500" y1="300" x2="500" y2="500" stroke="#777" stroke-width="2"/>
  <line x1="300" y1="500" x2="500" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="400" y1="250" x2="400" y2="550" stroke="#555" stroke-width="2"/>
  <line x1="250" y1="400" x2="550" y2="400" stroke="#777" stroke-width="2"/>
  
  <!-- Binary data visualization -->
  <text font-family="monospace" font-size="10" fill="#333">
    <tspan x="100" y="100">01001110 01000110 01010100</tspan>
    <tspan x="100" y="120">01000100 01101001 01100111 01101001 01110100 01100001 01101100</tspan>
    <tspan x="100" y="140">01000001 01110010 01110100</tspan>
    <tspan x="500" y="680">01000010 01101100 01101111 01100011 01101011 01100011 01101000 01100001 01101001 01101110</tspan>
    <tspan x="500" y="700">01010110 01100101 01110010 01101001 01100110 01101001 01100101 01100100</tspan>
  </text>
  
  <!-- Title -->
  <text x="400" y="750" font-family="monospace" font-size="24" text-anchor="middle" fill="#333">数字未来 - 王科技</text>
</svg>
