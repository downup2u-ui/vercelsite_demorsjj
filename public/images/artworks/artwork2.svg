<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f8f8f8"/>
  <!-- City skyline -->
  <rect x="100" y="400" width="80" height="200" fill="#333"/>
  <rect x="200" y="300" width="60" height="300" fill="#555"/>
  <rect x="280" y="350" width="40" height="250" fill="#777"/>
  <rect x="340" y="200" width="100" height="400" fill="#333"/>
  <rect x="460" y="350" width="70" height="250" fill="#555"/>
  <rect x="550" y="250" width="90" height="350" fill="#777"/>
  <rect x="660" y="400" width="50" height="200" fill="#333"/>
  
  <!-- Windows -->
  <pattern id="windows" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="scale(2)">
    <rect width="8" height="8" fill="#eee"/>
  </pattern>
  <rect x="110" y="420" width="60" height="160" fill="url(#windows)"/>
  <rect x="210" y="320" width="40" height="260" fill="url(#windows)"/>
  <rect x="290" y="370" width="20" height="210" fill="url(#windows)"/>
  <rect x="360" y="220" width="60" height="360" fill="url(#windows)"/>
  <rect x="470" y="370" width="50" height="210" fill="url(#windows)"/>
  <rect x="570" y="270" width="50" height="310" fill="url(#windows)"/>
  <rect x="670" y="420" width="30" height="160" fill="url(#windows)"/>
  
  <!-- Ground -->
  <rect x="50" y="600" width="700" height="50" fill="#555"/>
  
  <!-- Title -->
  <text x="400" y="750" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#333">城市记忆 - 李创新</text>
</svg>
